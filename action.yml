name: 'BoringCache Ruby'
description: 'Cache once. Reuse everywhere. Setup Ruby via mise and cache Ruby + gems with BoringCache.'
author: 'BoringCache'

inputs:
  cli-version:
    description: 'BoringCache CLI version (e.g., v1.0.0). Set to "skip" to disable automatic CLI setup.'
    required: false
    default: 'v1.12.3'
  ruby-version:
    description: 'Ruby version to install via mise. Auto-detected from .ruby-version, .tool-versions, or mise.toml if not specified.'
    required: false
    default: ''
  compile:
    description: 'Compile Ruby from source. Set to false (default) to use precompiled binaries for faster installs.'
    required: false
    default: 'false'
  working-directory:
    description: 'Working directory. Defaults to repository root.'
    required: false
    default: '.'
  workspace:
    description: 'BoringCache workspace identifier (e.g., my-org/my-project). Required.'
    required: false
  cache-tag:
    description: 'Cache tag prefix. Defaults to repository name.'
    required: false
    default: ''
  bundle-path:
    description: 'Path where gems are installed'
    required: false
    default: 'vendor/bundle'
  bundler-cache:
    description: 'Automatically run bundle install after setup (like ruby/setup-ruby bundler-cache)'
    required: false
    default: 'false'
  bundler-version:
    description: 'Bundler version to install. Auto-detected from Gemfile.lock BUNDLED WITH if not specified.'
    required: false
    default: ''
  cache-ruby:
    description: 'Cache Ruby installation from mise'
    required: false
    default: 'true'
  verbose:
    description: 'Enable verbose CLI output for debugging'
    required: false
    default: 'false'
  exclude:
    description: 'Glob patterns to exclude from bundle cache (e.g., "*.out,*.log")'
    required: false
    default: '*.out'
  save-always:
    description: 'Save cache even if job fails'
    required: false
    default: 'false'

outputs:
  ruby-version:
    description: 'Installed Ruby version'
  cache-hit:
    description: 'Whether the bundle cache was restored'
  ruby-cache-hit:
    description: 'Whether the Ruby cache was restored'
  bundle-tag:
    description: 'Cache tag used for bundle'
  ruby-tag:
    description: 'Cache tag used for Ruby'
  workspace:
    description: 'Resolved workspace name'

runs:
  using: 'node24'
  main: 'dist/restore/index.js'
  post: 'dist/save/index.js'
  post-if: "success() || inputs.save-always == 'true'"

branding:
  icon: 'box'
  color: 'blue'
